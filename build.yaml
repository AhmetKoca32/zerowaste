targets:
  $default:
    builders:
      freezed:
        options: {}
        generate_for:
          - lib/features/**/*.dart
      json_serializable:
        options:
          any_map: true
          checked: true
          create_factory: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_to_json: true
          field_rename: none
          ignore_unannotated: true
          include_if_null: true
        generate_for:
          - lib/features/**/*.dart
      riverpod_generator:
        options: {}
        generate_for:
          - lib/features/**/*.dart
